<nav class="nav">
  <a href="{{ "/" | relURL }}" class="nav-logo" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
    <img src="{{ print "images/" .Site.Params.logo.url | relURL }}"
         width="{{ .Site.Params.logo.width }}"
         height="{{ .Site.Params.logo.height }}"
         alt="{{ .Site.Params.logo.alt }}">
    <span style="font-size:20px; font-weight:600; color:#004f52;">Cherene de Bruyn</span>
  </a>

  <ul class="nav-links">
    {{ range .Site.Menus.main }}
      <li>
        {{ if eq .Name "Substack" }}
          <a href="{{ .URL }}" target="_blank">{{ .Name }}</a>
        {{ else }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </li>
    {{ end }}
  </ul>
</nav>
