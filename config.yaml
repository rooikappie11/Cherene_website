baseurl: "/"
locale: "en-US"
title: "Cherene de Bruyn"
theme: "hugo-lithium"
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]

permalinks:
  post: "/:year/:month/:day/:slug/"

menu:
  main:
    - name: About
      url: "/about/"
    - name: Publications
      url: "/publications/"
    - name: CV
      url: "/cv/"
    - name: Talks
      url: "/talks/"
    - name: Projects
      url: "/projects/"
    - name: "Substack"
      url: "https://cherenedebruyn.substack.com"
      
params:
  customCSS: ["css/style.css"]
  description: "A website built through Hugo and blogdown."
  highlightjsVersion: "9.12.0"
  highlightjsCDN: "//cdnjs.cloudflare.com/ajax/libs"
  highlightjsLang: ["r", "yaml"]
  highlightjsTheme: "github"
  MathJaxCDN: "//cdnjs.cloudflare.com/ajax/libs"
  MathJaxVersion: "2.7.5"
  favicon: "favicon.ico"
  logo:
    url: "CdBlogo.png"
    width: 50
    height: 50
    alt: "Logo"
  
  
security:
  allowContent: ['.*']

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: false

